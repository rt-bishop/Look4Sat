#noinspection UnusedVersionCatalogEntry
composeDebug = ["compose-debug-manifest", "compose-debug-tooling"]
#noinspection UnusedVersionCatalogEntry
unitTest = ["test-coroutines", "test-junit4"]
#noinspection UnusedVersionCatalogEntry
androidTest = ["androidTest-junit", "androidTest-espresso"]
